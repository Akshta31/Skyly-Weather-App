<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunny — Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="app-wrapper">
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">☀</span>
        <span class="logo-text">Sunny</span>
      </div>
      <p class="tagline">Your minimal weather companion</p>
    </header>

    <div class="search-section">
      <div class="search-bar">
        <span class="search-icon">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input type="text" id="cityInput" placeholder="Search for a city…" autocomplete="off" />
        <button id="searchBtn" onclick="searchWeather()">Search</button>
      </div>
      <button class="locate-btn" onclick="locateMe()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/>
          <circle cx="12" cy="12" r="8" stroke-opacity=".3"/>
        </svg>
        Use my location
      </button>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none"></div>

    <div id="loadingState" class="loading-state" style="display:none">
      <div class="loader-ring"></div>
      <p>Fetching weather data…</p>
    </div>

    <div id="weatherContent" class="weather-content" style="display:none">

      <!-- Hero Card -->
      <div class="hero-card">
        <div class="hero-left">
          <div class="city-info">
            <h1 id="cityName" class="city-name"></h1>
            <p id="dateStr" class="date-str"></p>
          </div>
          <div class="temp-block">
            <span id="tempVal" class="temp-val"></span>
            <span class="temp-unit">°C</span>
          </div>
          <p id="conditionText" class="condition-text"></p>
          <div class="hi-lo">
            <span>H: <strong id="tempMax"></strong>°</span>
            <span>L: <strong id="tempMin"></strong>°</span>
          </div>
        </div>
        <div class="hero-right">
          <div id="weatherIcon" class="hero-icon"></div>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">💧</div>
          <div class="stat-info">
            <p class="stat-label">Humidity</p>
            <p class="stat-value"><span id="humVal"></span><span class="stat-unit">%</span></p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💨</div>
          <div class="stat-info">
            <p class="stat-label">Wind Speed</p>
            <p class="stat-value"><span id="windVal"></span><span class="stat-unit">km/h</span></p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🌡</div>
          <div class="stat-info">
            <p class="stat-label">Feels Like</p>
            <p class="stat-value"><span id="feelsVal"></span><span class="stat-unit">°C</span></p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">👁</div>
          <div class="stat-info">
            <p class="stat-label">Visibility</p>
            <p class="stat-value"><span id="visVal"></span><span class="stat-unit">km</span></p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🌅</div>
          <div class="stat-info">
            <p class="stat-label">Sunrise</p>
            <p class="stat-value" id="sunriseVal" style="font-size:18px"></p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🌇</div>
          <div class="stat-info">
            <p class="stat-label">Sunset</p>
            <p class="stat-value" id="sunsetVal" style="font-size:18px"></p>
          </div>
        </div>
      </div>

      <!-- 5-Day Forecast -->
      <div class="forecast-section">
        <h2 class="section-title">5-Day Forecast</h2>
        <div class="forecast-row" id="forecastRow"></div>
      </div>

      <!-- Hourly Forecast -->
      <div class="forecast-section">
        <h2 class="section-title">Today's Hourly</h2>
        <div class="hourly-row" id="hourlyRow"></div>
      </div>

    </div>

    <footer class="app-footer">
      Powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap</a>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
